name: Despliegue con Key Segura

on:
  push:
    branches: [ "main" ]

jobs:
  ejecutar-con-seguridad:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar aplicación con API Key segura
      # Aquí "inyectamos" el secreto que guardaste en GitHub
      env:
        GROQ_API_KEY: ${{ secrets.API_KEY_IA }}
      run: |
        echo "El flujo se conectó correctamente."
        # Tu código ahora puede leer la variable de entorno 'GROQ_API_KEY'
        # sin que esté expuesta en el código fuente.